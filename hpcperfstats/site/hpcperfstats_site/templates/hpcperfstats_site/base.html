<!DOCTYPE html>
{% load static %}
<html lang="en">
  <head>
    <title>HPCPerf Stats</title>
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.0/dist/spacelab/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script type="text/javascript" src="https://cdn.pydata.org/bokeh/release/bokeh-3.8.2.min.js"></script>
    <script type="text/javascript" src="https://cdn.pydata.org/bokeh/release/bokeh-widgets-3.8.2.min.js"></script>
    <script type="text/javascript" src="https://cdn.pydata.org/bokeh/release/bokeh-tables-3.8.2.min.js"></script>
    <script type="text/javascript" src="https://cdn.pydata.org/bokeh/release/bokeh-api-3.8.2.min.js"></script>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style type="text/css">
    .navbar-brand{
        position: absolute;
        width: 100%;
        left: 0;
        text-align: center;
        margin: auto;
    }
    </style>
  </head>

  <body>
    <div class="container-fluid">
      {% if messages %}
      <div class="messages">
        {% for message in messages %}
        <div class="alert alert-dismissible {% if message.tags %}alert-{{ message.tags }}{% else %}alert-info{% endif %}" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        {% endfor %}
      </div>
      {% endif %}

      <nav class="navbar navbar-expand-lg navbar-light bg-light" role="navigation">
        <div class="container-fluid">
          <a class="navbar-brand" href="/machine/"><img src="{% url 'media' path='logo.png' %}" alt="Logo" style="max-width:35%;"/></a>
          <span class="navbar-text mx-auto">{{ machine_name }}</span>
          <form class="d-flex" action="{% url 'machine:search' %}" method="get" role="search">
            <input type="text" class="form-control me-2" name="jid" placeholder="Job ID">
            <button type="submit" class="btn btn-outline-secondary">find job</button>
          </form>
        </div>
      </nav>

    {% block content %}
    {% endblock %}
    </div>
  </body>
</html>
